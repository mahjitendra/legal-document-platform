version: "3.9"
services:
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    env_file:
      - ../../backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ../../backend:/app
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

